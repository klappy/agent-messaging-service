name: Bugbot

# Self-hosted bug-review-and-autofix on every PR, modeled after Cursor's
# Bugbot but using anthropics/claude-code-action@v1 with the operator's
# own Anthropic subscription (CLAUDE_CODE_OAUTH_TOKEN) instead of a
# third-party SaaS billing relationship.
#
# Two jobs share this workflow:
#
#   review — fires on every PR push (opened/synchronize/ready_for_review/
#            reopened). Non-gating. Posts inline review comments and a
#            summary. Sticky comment so successive pushes update one
#            thread instead of stacking.
#
#   respond — fires on @claude mentions in PR comments / review comments
#             / review submissions, and on PRs labeled `bugbot:fix`.
#             The action's intelligent mode detection takes over:
#             responses can include answering questions, suggesting
#             changes, OR pushing fix commits to the PR branch when
#             asked.
#
# Auth: prefers CLAUDE_CODE_OAUTH_TOKEN (subscription-billed) and falls
# back to ANTHROPIC_API_KEY. Same auth model as audit-gate-cca.yml.
#
# Distinct from the audit-gate workflows: bugbot is general code review
# (bugs, style, security, performance), not canon-governance. It does
# NOT gate merge. It does NOT enforce canon-code-sync or governance
# constraints — those remain the audit gates' job.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled]

concurrency:
  group: bugbot-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------
  # review — automatic non-gating bug review on every PR push.
  # --------------------------------------------------------------------
  review:
    name: Bugbot review
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify auth secret is present
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OAUTH" ] && [ -z "$KEY" ]; then
            echo "::error::Neither CLAUDE_CODE_OAUTH_TOKEN nor ANTHROPIC_API_KEY is set; bugbot review cannot run."
            exit 1
          fi

      - name: Run review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          track_progress: true
          prompt: |
            You are Bugbot for the agent-messaging-service repository. Your job is
            general code review on this PR — bugs, correctness, security,
            performance, readability, and test coverage. You do NOT enforce canon
            governance (that is the audit gates' job; see .github/workflows/gates.yml).

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            HEAD SHA:  ${{ github.event.pull_request.head.sha }}

            Review focus, in priority order:

            1. **Correctness bugs** — logic errors, off-by-one, null/undefined
               handling, race conditions, error-swallowing, missing await, unhandled
               promise rejections, type mistakes that pass `tsc` but fail at runtime.

            2. **Security** — input validation, secret leaks, prompt-injection
               surfaces, auth/authz mistakes, SSRF/XSS/SQL-injection patterns,
               unsafe deserialization, missing rate limits.

            3. **API contracts** — breaking changes to public types, route shapes,
               or DO/storage schemas without a migration path. AMS specifically
               cares about the MCP transport shape and the AMS broker wire format
               — flag any drift.

            4. **Test coverage** — new code without tests, removed tests without
               replacement, tests that don't actually exercise the new behavior.

            5. **Readability / maintainability** — only flag if it materially
               affects future maintainers. Don't bikeshed on style; prettier and
               eslint handle that.

            6. **Performance** — only flag if hot path or obvious O(n²) on
               unbounded input. AMS Worker code is performance-sensitive; non-
               Worker scripts less so.

            How to comment:

            - Use inline comments (`mcp__github_inline_comment__create_inline_comment`)
              for specific issues tied to a file+line.
            - Use one top-level summary comment for the overall verdict. Keep it
              short: a one-line summary plus a bulleted list of inline findings.
            - This is non-gating; do not exit non-zero on findings. Surface them
              as comments and let the human decide.
            - If the PR looks clean, post a short "no issues found" comment and stop.

            How to fix:

            - You do NOT push commits in review mode. If a fix is obvious and
              wanted, mention `@claude fix` in the summary so the operator can
              trigger autofix via the respond job.

          claude_args: |
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr files:*),Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(rg:*),Bash(grep:*),Bash(find:*),Read,Glob,Grep"

  # --------------------------------------------------------------------
  # respond — triggered work: answer @claude mentions, implement fixes.
  # --------------------------------------------------------------------
  respond:
    name: Bugbot respond
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'bugbot:fix')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify auth secret is present
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OAUTH" ] && [ -z "$KEY" ]; then
            echo "::error::Neither CLAUDE_CODE_OAUTH_TOKEN nor ANTHROPIC_API_KEY is set."
            exit 1
          fi

      - name: Run Claude (respond / autofix)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: bugbot:fix
          trigger_phrase: "@claude"
          # No `prompt:` — the action's intelligent mode detection chooses
          # the right behavior based on the trigger event. For @claude
          # mentions on a PR comment, it acts on the comment; for label
          # triggers, it interprets the label semantic. Autofix commits
          # land on the PR's head branch under the `claude[bot]` identity.
          claude_args: |
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr files:*),Bash(gh api:*),Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(rg:*),Bash(grep:*),Bash(find:*),Bash(sed:*),Bash(awk:*),Bash(jq:*),Read,Write,Edit,Glob,Grep"
