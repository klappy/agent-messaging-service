name: SSE keepalive contract

# Two-tier regression prevention for the GET /mcp SSE leg's leading-flush +
# idle-heartbeat contract:
#
#   - unit-proof: imports the REAL worker/src/sse-heartbeat.ts module
#     (compiled with tsc) and asserts five structural properties. Catches
#     code regressions before merge — no deploy needed.
#   - deployed-probe: hits the deployed Worker after CF Workers Build,
#     asserts BOTH the leading byte arrives within 2s AND a :keepalive
#     heartbeat distinct from :ok arrives within 20s. Catches deployed-state
#     regressions immediately after the push that introduced them.
#
# Authority: ams://canon/constraints/outcome-verification-via-runnable-artifact

on:
  pull_request:
    paths:
      - "worker/src/sse-heartbeat.ts"
      - "worker/src/mcp.ts"
      - "scripts/check-sse-heartbeat.sh"
      - "scripts/test-sse-wrapper-unit.mjs"
      - ".github/workflows/sse-keepalive.yml"
  push:
    branches:
      - main
    paths:
      - "worker/src/sse-heartbeat.ts"
      - "worker/src/mcp.ts"
      - "scripts/check-sse-heartbeat.sh"
      - "scripts/test-sse-wrapper-unit.mjs"
      - ".github/workflows/sse-keepalive.yml"

jobs:
  unit-proof:
    name: wrapper unit proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install worker deps (for tsc)
        working-directory: worker
        run: npm ci
      - name: Run wrapper unit tests
        run: node scripts/test-sse-wrapper-unit.mjs

  deployed-probe:
    name: deployed-substrate probe (main only, after CF deploy)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: unit-proof
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CF Workers Build to deploy
        # CF Workers Builds typically completes within 60-90s of push.
        # Sleep is conservative — an alternative would be polling the
        # GitHub deployments API, but a fixed wait is simpler and the
        # cost (one extra minute on push-to-main) is trivial.
        run: sleep 120
      - name: Probe ams.truthkit.ai (asserts leading byte AND heartbeat)
        env:
          AMS_URL: https://ams.truthkit.ai
        run: bash scripts/check-sse-heartbeat.sh
      - name: Probe ams.klappy.dev (asserts leading byte AND heartbeat)
        env:
          AMS_URL: https://ams.klappy.dev
        run: bash scripts/check-sse-heartbeat.sh
