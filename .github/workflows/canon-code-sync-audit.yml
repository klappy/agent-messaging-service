name: Canon-Code Sync Audit (Managed Agent)

# The merge gate is a Managed Agent dispatched by tools/audit-via-agent.py.
# This workflow is a TRIGGER and a comment-poster, not a gate. The agent's
# verdict is the gate. Architecture per:
#
#   klappy://canon/constraints/audit-gates-are-managed-agents (Tier-1, klappy.dev)
#   ams://canon/constraints/canon-code-sync-via-spawned-agent-session (AMS adoption)
#
# Required repo secret:
#   ANTHROPIC_API_KEY — for the Managed Agents API
#
# GITHUB_TOKEN is auto-provided per workflow run and is used ONLY by this
# workflow to post the agent's comment to the PR. It never appears in any
# payload sent to the Anthropic API; the agent has no GitHub credentials and
# clones the public repo unauthenticated from inside its sandbox.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'canon/**'
      - 'docs/**'
      - 'proposals/**'
      - 'writings/**'
      - 'packages/*/wrangler.toml'
      - 'worker/wrangler.toml'
      - 'packages/**/*.ts'
      - 'worker/**/*.ts'
      - 'SPEC*.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'TINCAN-*.md'
      - 'POC-*.md'
      - 'tools/audit-via-agent.py'
      - '.github/workflows/canon-code-sync-audit.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  audit:
    name: Dispatch Managed Agent for canon-code sync audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo (so the workflow can run the dispatcher script)
        uses: actions/checkout@v4

      - name: Verify ANTHROPIC_API_KEY is set
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repo secret is not set."
            echo "::error::Add it under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - name: Dispatch Managed Agent and capture structured result
        id: dispatch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER:   ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          REPO_FULL:   ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 tools/audit-via-agent.py > "${GITHUB_WORKSPACE}/result.json"
          echo "::group::Dispatcher result"
          jq '.' "${GITHUB_WORKSPACE}/result.json"
          echo "::endgroup::"
          VERDICT=$(jq -r '.verdict' "${GITHUB_WORKSPACE}/result.json")
          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"

      - name: Post agent's findings as PR comment
        if: always() && hashFiles('result.json') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:    ${{ github.event.pull_request.number }}
          REPO_FULL:    ${{ github.repository }}
        run: |
          set -euo pipefail
          # Build the GitHub API request body from the dispatcher's
          # comment_body field. jq handles all JSON escaping for us.
          jq '{body: .comment_body}' "${GITHUB_WORKSPACE}/result.json" > /tmp/comment-payload.json
          POST_HTTP=$(curl -sS -o /tmp/comment-resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_FULL}/issues/${PR_NUMBER}/comments" \
            --data-binary @/tmp/comment-payload.json || true)
          echo "PR comment POST: HTTP ${POST_HTTP}"
          if [ "$POST_HTTP" != "201" ]; then
            echo "::warning::PR comment POST failed (HTTP ${POST_HTTP}). Response:"
            cat /tmp/comment-resp.json || true
          fi

      - name: Exit on verdict
        env:
          VERDICT: ${{ steps.dispatch.outputs.verdict }}
        run: |
          case "$VERDICT" in
            PASS)
              echo "::notice::Canon-code sync audit: PASS"
              exit 0 ;;
            FAIL)
              echo "::error::Canon-code sync audit: FAIL — see PR comment for findings."
              exit 1 ;;
            ERROR|*)
              echo "::error::Canon-code sync audit: ERROR — see PR comment and dispatcher logs."
              exit 1 ;;
          esac
