name: Gates

# Orchestrator workflow that chains every PR audit gate behind a free
# smoke job. The motivation is cost: pre-2026-05-14, audit gates ran on
# a Cloudflare Worker that called the Anthropic API at pay-per-token
# rates (~$0.05-0.50 per gate run). This file's gates now run on GHA
# runners via anthropics/claude-code-action@v1 authenticated against a
# Pro/Max/Team/Enterprise subscription via CLAUDE_CODE_OAUTH_TOKEN —
# inference consumes the subscription's included usage rather than
# billing per-token, and GHA runner minutes are free for this public
# repo.
#
# Per klappy://canon/methods/spawned-agent-session-substrate-options
# §Mixing Tools Across Vendors, this is the cost-conscious decision-
# tree path for GitHub-hosted repos with an Anthropic subscription.
#
# Architecture:
#
#   smoke (free; runs on every PR push, even drafts)
#     ├── canon-code-sync       (needs smoke + not draft + legacy_gate_paths)
#     ├── oddkit-gauntlet       (needs smoke + not draft + canon_or_writings_or_journal)
#     └── output-artifact       (needs smoke + not draft + journal_tsv)
#
# Smoke is mechanical (typecheck + YAML frontmatter parse + TSV shape
# check) and finishes in 1-2 minutes. The expensive gates only fire if
# smoke passes AND the PR is out of draft AND the changed-paths classifier
# said this gate's scope is present in the diff. That means: a Bugbot
# autofix that introduces a YAML typo costs nothing (smoke fails, all
# gates skipped); a PR kept as draft costs nothing in gates (smoke runs
# as the operator iterates).
#
# Substrate switchover (2026-05-14):
#   - The legacy `canon-code-sync-legacy` job (Anthropic Managed Agents
#     dispatcher via `tools/audit-via-agent.py`) is REMOVED.
#   - The three runtime-probe jobs that called the CF Worker's
#     /audit-gate-test endpoint via OIDC are REWIRED to the new
#     reusable workflow `.github/workflows/audit-gate-cca.yml`, which
#     dispatches claude-code-action with the same persona URIs.
#   - The audit task (canon-at-runtime via oddkit, persona-shaped,
#     structured verdict) is UNCHANGED — only the substrate moved.
#   - "(runtime probe)" labels removed; these are the only gates now,
#     not parallel probes.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel any in-flight gate run on the same PR when a new commit lands.
# Bugbot autofixes land new commits frequently; we want only the most
# recent commit's verdict to matter.
concurrency:
  group: gates-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  smoke:
    name: Smoke (free; mechanical checks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      canon_or_writings_or_journal: ${{ steps.classify.outputs.canon_or_writings_or_journal }}
      journal_tsv: ${{ steps.classify.outputs.journal_tsv }}
      legacy_gate_paths: ${{ steps.classify.outputs.legacy_gate_paths }}
      worker_code: ${{ steps.classify.outputs.worker_code }}

    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          # Full history so `git diff` against base.sha resolves.
          fetch-depth: 0

      - name: Compute changed files vs base
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_SHA" 2>/dev/null || true
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/changed.txt
          echo "::group::Changed files vs base"
          cat /tmp/changed.txt || true
          echo "::endgroup::"
          echo "count=$(wc -l < /tmp/changed.txt)" >> "$GITHUB_OUTPUT"

      - name: Classify changed paths
        id: classify
        run: |
          set -euo pipefail
          CHANGED=/tmp/changed.txt
          # Use grep -q with anchored patterns to set per-class booleans.
          # Each class is the union of paths that a downstream gate cares
          # about. Keep the legacy_gate_paths list in sync with the canon-
          # code-sync constraint's scope — that's the gate whose scope
          # this classifies.

          classify() {
            local name="$1"; shift
            local pattern_file
            pattern_file=$(mktemp)
            for pat in "$@"; do printf '%s\n' "$pat" >> "$pattern_file"; done
            if grep -E -f "$pattern_file" "$CHANGED" >/dev/null 2>&1; then
              echo "${name}=true" >> "$GITHUB_OUTPUT"
              echo "  ✅ ${name}=true"
            else
              echo "${name}=false" >> "$GITHUB_OUTPUT"
              echo "  ➖ ${name}=false"
            fi
            rm -f "$pattern_file"
          }

          echo "::group::Path classification"

          # Oddkit Gauntlet scope: any governance markdown.
          classify canon_or_writings_or_journal \
            '^canon/.+\.md$' \
            '^writings/.+\.md$' \
            '^journal/.+\.md$'

          # Output-Artifact scope: journal TSV files (initial scope; the
          # constraint canon allows-list table is the seam for extending
          # to other formats).
          classify journal_tsv \
            '^journal/.+\.tsv$'

          # Canon-code-sync scope. Mirrors the gating semantics the previous
          # gate enforced; unchanged across the substrate switch.
          classify legacy_gate_paths \
            '^canon/' \
            '^docs/' \
            '^proposals/' \
            '^writings/' \
            '^packages/[^/]+/wrangler\.toml$' \
            '^worker/wrangler\.toml$' \
            '^packages/.*\.ts$' \
            '^worker/.*\.ts$' \
            '^SPEC.*\.md$' \
            '^README\.md$' \
            '^AGENTS\.md$' \
            '^TINCAN-.*\.md$' \
            '^POC-.*\.md$' \
            '^\.github/workflows/gates\.yml$' \
            '^\.github/workflows/audit-gate-cca\.yml$'

          # Worker code scope: triggers TypeScript typecheck during smoke.
          classify worker_code \
            '^worker/.*\.ts$' \
            '^worker/wrangler\.toml$' \
            '^worker/package\.json$' \
            '^worker/package-lock\.json$' \
            '^worker/tsconfig\.json$'

          echo "::endgroup::"

      - name: Set up Node (for worker typecheck)
        if: steps.classify.outputs.worker_code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        if: steps.classify.outputs.worker_code == 'true'
        working-directory: worker
        run: npm ci

      - name: TypeScript typecheck (worker)
        if: steps.classify.outputs.worker_code == 'true'
        working-directory: worker
        run: npx tsc --noEmit

      - name: Install pyyaml (for frontmatter validator)
        if: ${{ !cancelled() && steps.classify.outputs.canon_or_writings_or_journal == 'true' }}
        run: pip install --quiet pyyaml

      - name: Validate YAML frontmatter on changed canon/writings docs
        if: ${{ !cancelled() && steps.classify.outputs.canon_or_writings_or_journal == 'true' }}
        run: python3 .github/scripts/validate-frontmatter.py /tmp/changed.txt

      - name: Validate Dolcheo+ TSV shape on changed journal entries
        if: ${{ !cancelled() && steps.classify.outputs.journal_tsv == 'true' }}
        run: python3 .github/scripts/validate-tsv-shape.py /tmp/changed.txt

      - name: Smoke summary
        if: always()
        run: |
          echo "::notice::Smoke complete."
          echo "  legacy_gate_paths=${{ steps.classify.outputs.legacy_gate_paths }}"
          echo "  canon_or_writings_or_journal=${{ steps.classify.outputs.canon_or_writings_or_journal }}"
          echo "  journal_tsv=${{ steps.classify.outputs.journal_tsv }}"
          echo "  worker_code=${{ steps.classify.outputs.worker_code }}"
          echo "  draft=${{ github.event.pull_request.draft }}"

  # ----------------------------------------------------------------------
  # Audit gates — all chained behind smoke + not-draft + per-gate path-
  # class match. If any of these conditions are false, the gate skips
  # (zero Claude subscription consumption).
  # ----------------------------------------------------------------------

  canon-code-sync:
    name: Canon-Code Sync Audit
    needs: [smoke]
    if: |
      github.event.pull_request.draft == false &&
      needs.smoke.outputs.legacy_gate_paths == 'true'
    uses: ./.github/workflows/audit-gate-cca.yml
    secrets: inherit
    with:
      persona_uri: ams://canon/personas/ams-canon-code-auditor
      comment_header: Canon-Code Sync Audit

  oddkit-gauntlet:
    name: Oddkit Gauntlet
    needs: [smoke]
    if: |
      github.event.pull_request.draft == false &&
      needs.smoke.outputs.canon_or_writings_or_journal == 'true'
    uses: ./.github/workflows/audit-gate-cca.yml
    secrets: inherit
    with:
      persona_uri: ams://canon/personas/ams-oddkit-gauntlet-runner
      comment_header: Oddkit Gauntlet

  output-artifact:
    name: Output-Artifact Validation
    needs: [smoke]
    if: |
      github.event.pull_request.draft == false &&
      needs.smoke.outputs.journal_tsv == 'true'
    uses: ./.github/workflows/audit-gate-cca.yml
    secrets: inherit
    with:
      persona_uri: ams://canon/personas/ams-output-artifact-validator
      comment_header: Output-Artifact Validation
