name: Canon-Code Sync Audit (runtime probe)

# Side-by-side probe of the canon-code-sync audit gate, running on the
# AuditGateDO runtime instead of the Managed Agents path. The legacy
# canon-code-sync-audit.yml workflow continues to gate merge; this
# workflow accumulates parity evidence so the operator can decide when
# to cut over (per the canon constraint
# canon-code-sync-via-spawned-agent-session §Current Implementation).
#
# This is a caller of the reusable audit-gate-runtime-probe.yml; the
# substrate work lives there. Adding a new audit type means writing
# a new caller workflow with a different persona_uri — no substrate
# changes.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Intentionally not triggering on pull_request_target: per GitHub's
  # December 2025 change, pull_request_target sets github.sha (and thus
  # the OIDC token's sha claim) to the default branch HEAD rather than
  # the PR head commit. The Worker keys the AuditGateDO by claims.sha,
  # so a pull_request_target run would route to a stale/shared DO
  # instance and audit the wrong commit. The probe runs on pull_request
  # only, where github.sha is the PR head's merge ref.

# Cancel in-progress probes when new commits arrive on the same PR;
# only the most recent commit's verdict matters.
concurrency:
  group: audit-gate-runtime-probe-canon-code-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  pull-requests: write
  contents: read

jobs:
  canon-code-sync-probe:
    uses: ./.github/workflows/audit-gate-runtime-probe.yml
    with:
      persona_uri: ams://canon/personas/ams-canon-code-auditor
      comment_header: Canon-Code Sync Audit (runtime probe)
