name: Canon Drift Check

on:
  pull_request:
    paths:
      - 'canon/**.md'
      - 'writings/**.md'
      - 'docs/handoffs/**.md'
      - 'proposals/**.md'
      - 'scripts/check-canon-drift.py'
      - '.github/workflows/canon-drift-check.yml'

jobs:
  check-paths:
    name: Validate path references against repo state
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine changed canon files
        id: changed
        run: |
          set -euo pipefail
          base_ref="${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "$base_ref"
          # Per ams://canon/constraints/canon-implementation-path-integrity §"The Validation Rules",
          # validation applies only to "every path reference in the changed files" — scope the
          # scan to the PR's changed canon-tracked .md files instead of the whole corpus.
          git diff --name-only --diff-filter=ACMRT \
            "origin/${base_ref}...HEAD" -- canon writings docs/handoffs proposals \
            | grep -E '\.md$' > changed-canon.txt || true
          echo 'Changed canon files:'
          cat changed-canon.txt

      - name: Run canon drift checker
        run: |
          if [ ! -s changed-canon.txt ]; then
            echo 'No changed canon-tracked .md files; nothing to validate.'
            exit 0
          fi
          python3 scripts/check-canon-drift.py --repo-root . --files-from changed-canon.txt

      - name: Annotate findings as PR comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const findings = fs.existsSync('drift-findings.md')
              ? fs.readFileSync('drift-findings.md', 'utf8')
              : 'See workflow logs for drift details.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Canon Drift Detected',
                '',
                'The canon-implementation-path-integrity check failed. Path references in the changed files do not match the repo\'s actual state on the target branch.',
                '',
                findings,
                '',
                'See `ams://canon/constraints/canon-implementation-path-integrity` for the discipline this enforces. Fix the canon to match reality, or annotate aspirational paths with a `future` / `aspirational` block annotation.',
              ].join('\n'),
            });
