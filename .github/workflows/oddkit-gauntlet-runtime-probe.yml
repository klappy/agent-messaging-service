name: Oddkit Gauntlet (runtime probe)

# Side-by-side probe of the oddkit gauntlet runner persona on the AMS
# audit-gate runtime substrate. Caller of the reusable workflow
# .github/workflows/audit-gate-runtime-probe.yml.
#
# Per the canon constraint
# ams://canon/constraints/oddkit-gauntlet-via-spawned-agent-session,
# this audit runs oddkit_challenge and oddkit_audit on changed canon,
# writings, and journal markdown documents in canon PRs. The persona
# ams-oddkit-gauntlet-runner pressure-tests claims and walks URI
# references, then emits a verdict in Oddie's voice
# (klappy://canon/voice/oddie-the-river-guide).
#
# Path filter: this workflow only fires on PRs that touch governance
# content. Code-only PRs don't trigger it (the canon-code-sync gate
# covers those). Promotion to gating is operator-decided after parity
# observation.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'canon/**/*.md'
      - 'writings/**/*.md'
      - 'journal/**/*.md'
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'canon/**/*.md'
      - 'writings/**/*.md'
      - 'journal/**/*.md'

concurrency:
  group: audit-gate-runtime-probe-oddkit-gauntlet-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  pull-requests: write
  contents: read

jobs:
  oddkit-gauntlet-probe:
    uses: ./.github/workflows/audit-gate-runtime-probe.yml
    with:
      persona_uri: ams://canon/personas/ams-oddkit-gauntlet-runner
      comment_header: Oddkit Gauntlet (runtime probe)
