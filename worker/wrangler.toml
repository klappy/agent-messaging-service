name = "ams"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Per ams://canon/decisions/D0011-multi-host-cname-deployment, both hostnames
# route to the same Worker. The Worker reads request.headers.get('host') only
# when constructing magic links to return; everywhere else the host is
# irrelevant.
routes = [
  { pattern = "ams.klappy.dev",  custom_domain = true },
  { pattern = "ams.truthkit.ai", custom_domain = true }
]

[[kv_namespaces]]
binding = "AMS_KV"
id = "f77cc1625168407c8100140426e3c687"

# ConversationDO — one Durable Object per conversation_id. The Worker resolves
# alias → conversation_id via KV at upgrade time, then routes here via
# CONVERSATION_DO.idFromName(conversation_id). The DO holds the in-memory
# stream registry, the per-stream subscription set, and the WebSocket handles.
# See worker/src/conversation.ts and ams://canon/decisions/D0009.
[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationDO"

# SessionDO — one Durable Object per (account_id, conversation_id) pair.
# Holds the MCP edge wrapper's per-session state: the upstream wire
# WebSocket to the ConversationDO, the recv buffer for ams_recv, and the
# tenant set (cooperative MCP transport sessions per D0019). See
# worker/src/mcp.ts and ams://canon/decisions/D0019.
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

# First DO migration on this Worker. Required the first time DO classes are
# introduced; tag is the migration identifier (Cloudflare records it on the
# Worker so future migrations can rename / transfer / delete classes).
[[migrations]]
tag = "v1"
new_classes = ["ConversationDO"]

# Second migration: introduce the SessionDO class for the MCP edge wrapper.
# Per ams://canon/decisions/D0019 cross-session continuity via account-conversation keying.
[[migrations]]
tag = "v2"
new_classes = ["SessionDO"]

# Secrets set via `wrangler secret put`:
#   AMS_CREDENTIAL_PEPPER         (random 32-byte hex; mixed into bearer hash)
#   AMS_PERMISSIVE_TOKEN_PEPPER   (same idea, for permissive tokens)
