name = "ams"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Per ams://canon/decisions/D0011-multi-host-cname-deployment, both hostnames
# route to the same Worker. The Worker reads request.headers.get('host') only
# when constructing magic links to return; everywhere else the host is
# irrelevant.
routes = [
  { pattern = "ams.klappy.dev",  custom_domain = true },
  { pattern = "ams.truthkit.ai", custom_domain = true }
]

[[kv_namespaces]]
binding = "AMS_KV"
id = "f77cc1625168407c8100140426e3c687"

# ConversationDO — one Durable Object per conversation_id. The Worker resolves
# alias → conversation_id via KV at upgrade time, then routes here via
# CONVERSATION_DO.idFromName(conversation_id). The DO holds the in-memory
# stream registry, the per-stream subscription set, and the WebSocket handles.
# See worker/src/conversation.ts and ams://canon/decisions/D0009.
[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationDO"

# AmsMcpAgent — Cloudflare `agents/mcp` McpAgent subclass per
# ams://canon/decisions/D0024. One DO instance per MCP transport session
# (SDK-keyed). (account_id, conversation_id) is threaded as construction
# props per D0019; the SDK's mcp-session-id is internal to the transport.
# See worker/src/mcp.ts.
[[durable_objects.bindings]]
name = "AMS_MCP"
class_name = "AmsMcpAgent"

# First DO migration on this Worker. Required the first time DO classes are
# introduced; tag is the migration identifier (Cloudflare records it on the
# Worker so future migrations can rename / transfer / delete classes).
[[migrations]]
tag = "v1"
new_classes = ["ConversationDO"]

# Second migration: introduce the SessionDO class for the original handrolled
# MCP edge wrapper. Retired by ams://canon/decisions/D0024 — the v3 migration
# below deletes the class. Tag preserved for migration-history continuity.
[[migrations]]
tag = "v2"
new_classes = ["SessionDO"]

# Third migration: D0024 rewrite — retire the handrolled SessionDO, introduce
# the SDK-substrate AmsMcpAgent class with SQLite storage (the agents/mcp
# default). Any in-flight handrolled session fails with session-not-found at
# deploy time per D0024 §"The Migration Shape"; clients reconnect per MCP
# transport semantics.
[[migrations]]
tag = "v3"
deleted_classes = ["SessionDO"]
new_sqlite_classes = ["AmsMcpAgent"]

# Secrets set via `wrangler secret put`:
#   AMS_CREDENTIAL_PEPPER         (random 32-byte hex; mixed into bearer hash)
#   AMS_PERMISSIVE_TOKEN_PEPPER   (same idea, for permissive tokens)

# Workers Logs — dashboard-toggled, synced here so deploys do not regress the
# setting. Captures broker-internal request shape (outcome, method, path,
# status, duration, CPU/wall time) — metadata only, no payload contents.
# Aligned with ams://canon/constraints/observability-payload-boundary
# (capture shape, discard substance) and feeds the same Tail-Worker /
# Analytics Engine plane as the rest of broker-internal observability.
[observability.logs]
enabled = true
invocation_logs = true

# Workers Traces — same plane, same boundary as logs above. Distributed
# request traces (timing spans across the Worker → DO → KV → Analytics
# Engine path), no payload capture. Useful for diagnosing wire-layer
# latency without touching the polymorphic-subscriber observability plane
# (D0010). Synced from dashboard so deploys do not regress it.
[observability.traces]
enabled = true
